<!-- @dsCard group="Type" viewport="700x140" name="Eyebrow & data" subtitle="UI label 700 uppercase · data 800 tabular" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: #fff; display: flex; gap: 40px; align-items: center; }
  .block { display: flex; flex-direction: column; gap: 6px; }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--color-deep-teal); }
  .num { font-weight: 800; font-variant-numeric: tabular-nums; font-size: 48px; letter-spacing: -0.02em; color: var(--color-deep-teal); line-height: 1; }
  .nums-row { display: flex; gap: 18px; }
  .tk { font-size: 10.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
<div class="block">
  <span class="eyebrow">Needs attention</span>
  <span class="tk">Eyebrow · Public Sans 700 · uppercase · tracked</span>
</div>
<div class="block">
  <div class="nums-row">
    <span class="num">1,240</span>
    <span class="num">86.4%</span>
  </div>
  <span class="tk">Data · Public Sans 800 · tabular numerals</span>
</div>
</body>
</html>
