<!-- @dsCard group="Brand" viewport="700x170" name="The mark — “the resolve”" subtitle="Scattered records converge to one forward point" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: #fff; display: flex; align-items: center; gap: 26px; }
  .icons { display: flex; align-items: center; gap: 16px; }
  .tile { border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex: none; }
  .app { width: 84px; height: 84px; }
  .app img { width: 84px; height: 84px; border-radius: var(--radius-lg); }
  .onlight { width: 64px; height: 64px; background: #fff; border: 1px solid var(--border-subtle); }
  .ondark { width: 64px; height: 64px; background: var(--surface-dark); }
  img.mark { width: 70%; height: 70%; }
  .note { font-size: 13px; line-height: 1.55; color: var(--text-body); max-width: 32ch; }
  .note b { color: var(--text-strong); }
  .clear { font-size: 11.5px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
<div class="icons">
  <span class="tile app"><img src="../assets/forevue-app-icon-512.png" alt="Forevue app icon"></span>
  <span class="tile onlight"><img class="mark" src="../assets/forevue-icon-on-light.svg" alt="mark on light"></span>
  <span class="tile ondark"><img class="mark" src="../assets/forevue-icon-on-dark.svg" alt="mark on dark"></span>
</div>
<div>
  <p class="note"><b>fore + vue</b> — foresight. Teal lines converge to one amber focal point that looks forward. The single device Forevue is remembered by.</p>
  <p class="clear">Clear space = the mark's own height. Below ~120px lockup width, use the icon alone.</p>
</div>
</body>
</html>
