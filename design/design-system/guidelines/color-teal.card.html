<!-- @dsCard group="Colors" viewport="700x150" name="Teal — the spine" subtitle="Forevue Teal #0E7C86 carries brand + product" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; font-family: var(--font-sans); background: #fff; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 70px; }
  .meta { padding: 7px 9px; }
  .nm { font-size: 12px; font-weight: 600; color: var(--text-strong); }
  .hx { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .star { color: var(--accent); }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--color-teal-900)"></div><div class="meta"><div class="nm">Midnight</div><div class="hx">#06363B</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-teal-700)"></div><div class="meta"><div class="nm">Deep Teal</div><div class="hx">#0A656D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-teal-600)"></div><div class="meta"><div class="nm">Forevue Teal <span class="star">★</span></div><div class="hx">#0E7C86</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-teal-300)"></div><div class="meta"><div class="nm">Teal 300</div><div class="hx">#5FAEB3</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-teal-50)"></div><div class="meta"><div class="nm">Teal 50</div><div class="hx">#EAF4F2</div></div></div>
</div>
</body>
</html>
