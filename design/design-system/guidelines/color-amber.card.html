<!-- @dsCard group="Colors" viewport="700x150" name="Amber — the one spark" subtitle="Insight Amber #E6A23C · one per view, never a background" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; font-family: var(--font-sans); background: #fff; display: flex; gap: 16px; align-items: center; }
  .sw { width: 150px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); flex: none; }
  .chip { height: 78px; }
  .meta { padding: 8px 10px; }
  .nm { font-size: 12.5px; font-weight: 600; color: var(--text-strong); }
  .hx { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .note { font-size: 13px; line-height: 1.55; color: var(--text-body); max-width: 40ch; }
  .note b { color: var(--text-strong); }
  .ramp { display: flex; gap: 6px; }
  .ramp div { width: 40px; height: 40px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
</style>
</head>
<body>
<div class="sw"><div class="chip" style="background:var(--color-amber)"></div><div class="meta"><div class="nm">Insight Amber</div><div class="hx">#E6A23C</div></div></div>
<div>
  <p class="note"><b>The moment of clarity.</b> One accent per view — a focal point, a single flagged number, the amber point in the mark. <b>Never a background fill.</b></p>
  <div class="ramp" style="margin-top:10px">
    <div style="background:var(--color-amber-700)"></div>
    <div style="background:var(--color-amber-600)"></div>
    <div style="background:var(--color-amber-200)"></div>
    <div style="background:var(--color-amber-50)"></div>
  </div>
</div>
</body>
</html>
