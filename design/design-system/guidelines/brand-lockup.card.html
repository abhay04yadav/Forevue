<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); }
  .split { display: flex; height: 206px; }
  .half { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .light { background: #fff; border-right: 1px solid var(--border-subtle); }
  .dark { background: var(--surface-dark); }
  img { width: 210px; height: auto; }
</style>
</head>
<body>
<div class="split">
  <div class="half light"><img src="../assets/forevue-lockup-on-light.svg" alt="Forevue lockup on light"></div>
  <div class="half dark"><img src="../assets/forevue-lockup-on-dark.svg" alt="Forevue lockup on dark"></div>
</div>
</body>
</html>
