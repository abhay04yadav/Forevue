<!-- @dsCard group="Colors" viewport="700x150" name="Paper & midnight — marketing" subtitle="Warm paper surface; midnight hero canvas" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); }
  .split { display: flex; height: 186px; }
  .half { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 18px; }
  .paper { background: var(--surface-paper); border-right: 1px solid var(--border-paper); }
  .dark { background: var(--surface-dark); }
  .nm { font-size: 13px; font-weight: 700; }
  .hx { font-size: 11px; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .role { font-size: 11.5px; margin-top: 4px; }
  .paper .nm { color: var(--color-ink); } .paper .hx, .paper .role { color: var(--color-mist); }
  .dark .nm { color: #fff; } .dark .hx, .dark .role { color: #B9D4D5; }
  .ser { font-family: var(--font-serif); font-size: 22px; }
  .paper .ser { color: var(--color-ink); } .dark .ser { color: #fff; }
  .dark .ser em { color: var(--accent); font-style: italic; }
</style>
</head>
<body>
<div class="split">
  <div class="half paper">
    <div class="ser">See it coming.</div>
    <div style="margin-top:auto"></div>
    <div class="nm">Paper</div><div class="hx">#F7F5F0</div>
    <div class="role">Warm marketing surface (not used in-app)</div>
  </div>
  <div class="half dark">
    <div class="ser">Clarity, <em>early.</em></div>
    <div style="margin-top:auto"></div>
    <div class="nm">Midnight Teal</div><div class="hx">#06363B</div>
    <div class="role">Hero canvases · white text passes AA</div>
  </div>
</div>
</body>
</html>
