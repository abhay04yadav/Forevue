<!-- @dsCard group="Type" viewport="700x150" name="Display — Spectral (marketing only)" subtitle="Serif headlines & tagline · never inside the product" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--surface-paper); }
  .display { font-family: var(--font-serif); font-weight: 600; font-size: 42px; letter-spacing: -0.015em; line-height: 1.05; color: var(--color-ink); }
  .tagline { font-family: var(--font-serif); font-style: italic; font-size: 22px; color: var(--color-deep-teal); margin-top: 6px; }
  .tagline em { color: var(--accent); }
  .meta { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--color-mist); margin-top: 14px; }
</style>
</head>
<body>
<div class="display">See it coming.</div>
<div class="tagline">Clarity, <em>early.</em></div>
<div class="meta">Spectral 600 · italic for the tagline · marketing surfaces only</div>
</body>
</html>
