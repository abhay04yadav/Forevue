<!-- @dsCard group="Type" viewport="700x180" name="Public Sans — the product face" subtitle="All UI, body, labels & data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: #fff; color: var(--text-body); }
  .scale > div { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 9px 0; border-top: 1px solid var(--border-subtle); }
  .scale > div:first-child { border-top: none; }
  .tk { font-size: 10.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); flex: none; }
  .h1 { font-size: 30px; font-weight: 600; color: var(--text-strong); letter-spacing: -0.01em; }
  .h2 { font-size: 20px; font-weight: 600; color: var(--text-strong); }
  .body { font-size: 15px; font-weight: 400; }
  .small { font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="scale">
  <div><span class="h1">Heading — semibold 600</span><span class="tk">30 / 600</span></div>
  <div><span class="h2">Subhead — semibold 600</span><span class="tk">20 / 600</span></div>
  <div><span class="body">Body — Forevue reads across the systems you already run.</span><span class="tk">15 / 400</span></div>
  <div><span class="small">Small / muted — used for hints and meta.</span><span class="tk">13 / 400</span></div>
</div>
</body>
</html>
