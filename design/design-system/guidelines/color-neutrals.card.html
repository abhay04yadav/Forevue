<!-- @dsCard group="Colors" viewport="700x150" name="Cool neutrals — in-app" subtitle="Product surfaces stay cooler/neutral white" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; font-family: var(--font-sans); background: #fff; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 56px; }
  .meta { padding: 6px 8px; }
  .nm { font-size: 11px; font-weight: 600; color: var(--text-strong); }
  .hx { font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--color-white);border-bottom:1px solid var(--border-subtle)"></div><div class="meta"><div class="nm">White</div><div class="hx">surface</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-neutral-50)"></div><div class="meta"><div class="nm">50</div><div class="hx">page</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-neutral-100)"></div><div class="meta"><div class="nm">100</div><div class="hx">sunken</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-neutral-200)"></div><div class="meta"><div class="nm">200</div><div class="hx">border</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-neutral-400)"></div><div class="meta"><div class="nm">400</div><div class="hx">strong</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-neutral-600)"></div><div class="meta"><div class="nm">Mist</div><div class="hx">#5E7175</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-neutral-900)"></div><div class="meta"><div class="nm">Ink</div><div class="hx">#0E1B22</div></div></div>
</div>
</body>
</html>
