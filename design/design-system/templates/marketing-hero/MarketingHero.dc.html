<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Marketing hero" description="Midnight-teal hero with the resolve motif, Spectral headline and one amber spark — the Forevue marketing opener." -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>
<div style="min-height:100vh;background:radial-gradient(130% 120% at 80% 0%, #0A5560 0%, #06363B 60%);color:#EAF3F2;font-family:var(--font-sans);padding:0;box-sizing:border-box;">
  <nav style="display:flex;align-items:center;gap:28px;height:64px;max-width:1120px;margin:0 auto;padding:0 32px;box-sizing:border-box;">
    <img src="../../assets/forevue-lockup-on-dark.svg" alt="Forevue" style="height:26px;" />
    <div style="margin-left:auto;display:flex;gap:14px;align-items:center;">
      <a href="#" style="font-size:13.5px;color:#EAF3F2;font-weight:600;text-decoration:none;border:1px solid #1C545A;border-radius:10px;padding:9px 14px;">Sign in</a>
      <a href="#" style="font-size:13.5px;color:#fff;font-weight:600;text-decoration:none;background:#0E7C86;border-radius:10px;padding:9px 16px;">Book a walkthrough</a>
    </div>
  </nav>

  <div style="max-width:1120px;margin:0 auto;padding:72px 32px 96px;box-sizing:border-box;display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;align-items:center;">
    <div>
      <div style="font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#6FA9AD;margin-bottom:22px;">The intelligence layer for higher education</div>
      <h1 style="font-family:var(--font-serif);font-weight:600;font-size:72px;line-height:1.02;letter-spacing:-0.02em;color:#fff;margin:0 0 22px;max-width:16ch;">Clarity, <em style="font-style:italic;color:#E6A23C;">early.</em></h1>
      <p style="font-size:19px;color:#B9D4D5;max-width:52ch;margin:0 0 32px;line-height:1.55;">See inside the systems your college already runs — and catch the students who need attention before the exam hall does.</p>
      <div style="display:flex;gap:14px;align-items:center;">
        <a href="#" style="display:inline-flex;align-items:center;height:44px;padding:0 22px;border-radius:10px;background:#0E7C86;color:#fff;font-weight:600;font-size:15px;text-decoration:none;">Book a walkthrough</a>
        <a href="#" style="display:inline-flex;align-items:center;height:44px;padding:0 18px;border-radius:10px;color:#EAF3F2;font-weight:600;font-size:15px;text-decoration:none;border:1px solid #1C545A;">See how it works →</a>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;min-height:320px;">
      <svg viewBox="0 0 460 320" style="width:100%;max-width:460px;height:auto;" aria-hidden="true">
        <g stroke="#3E747A" stroke-width="2" opacity="0.5">
          <line x1="20" y1="40" x2="220" y2="160"></line><line x1="10" y1="100" x2="220" y2="160"></line>
          <line x1="30" y1="170" x2="220" y2="160"></line><line x1="12" y1="230" x2="220" y2="160"></line>
          <line x1="36" y1="285" x2="220" y2="160"></line>
        </g>
        <g fill="#5FAEB3"><circle cx="20" cy="40" r="4"></circle><circle cx="10" cy="100" r="4"></circle><circle cx="30" cy="170" r="4"></circle><circle cx="12" cy="230" r="4"></circle><circle cx="36" cy="285" r="4"></circle></g>
        <line x1="120" y1="120" x2="300" y2="160" stroke="#7FBFC3" stroke-width="5" stroke-linecap="round"></line>
        <line x1="100" y1="160" x2="300" y2="160" stroke="#fff" stroke-width="6" stroke-linecap="round"></line>
        <line x1="120" y1="200" x2="300" y2="160" stroke="#7FBFC3" stroke-width="5" stroke-linecap="round"></line>
        <circle cx="300" cy="160" r="13" fill="#E6A23C"></circle>
        <line x1="320" y1="160" x2="362" y2="160" stroke="#E6A23C" stroke-width="6" stroke-linecap="round"></line>
      </svg>
    </div>
  </div>
</div>

</x-dc>
</body>
</html>
