<!-- @dsCard group="Components" viewport="700x230" name="Buttons & icon buttons" subtitle="One teal primary per view; quiet bordered secondaries" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }
  .lab { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); width: 92px; flex: none; }
  i[data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton } = window.ForevueDesignSystem_24f415;
  function Demo() {
    const send = <i data-lucide="arrow-up"></i>;
    return (
      <div>
        <div className="row">
          <span className="lab">Variants</span>
          <Button variant="primary">Save draft</Button>
          <Button variant="secondary">Cancel</Button>
          <Button variant="ghost">View evidence</Button>
          <Button variant="danger">Delete</Button>
        </div>
        <div className="row">
          <span className="lab">Sizes</span>
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
          <Button disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="lab">With icon</span>
          <Button iconLeft={<i data-lucide="sparkles"></i>}>Ask Forevue</Button>
          <Button variant="secondary" iconRight={<i data-lucide="chevron-down"></i>}>This week</Button>
          <IconButton aria-label="More"><i data-lucide="more-horizontal"></i></IconButton>
          <IconButton aria-label="Filter" variant="bordered"><i data-lucide="sliders-horizontal"></i></IconButton>
          <IconButton aria-label="Send" variant="solid"><i data-lucide="arrow-up"></i></IconButton>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
