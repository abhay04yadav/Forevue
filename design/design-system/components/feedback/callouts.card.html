<!-- @dsCard group="Components" viewport="700x230" name="Callouts" subtitle="Inline notes — abstain & human-owned draft tones" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .col { display: flex; flex-direction: column; gap: 12px; }
  i[data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Callout } = window.ForevueDesignSystem_24f415;
  function Demo() {
    return (
      <div className="col">
        <Callout tone="abstain" title="Not enough to answer" icon={<i data-lucide="circle-slash"></i>}>
          Attendance for CSE-3 hasn't synced since Tuesday. I can't ground this yet.
        </Callout>
        <Callout tone="draft" title="Draft — for you to review" icon={<i data-lucide="pencil-line"></i>}>
          A message to the mentors of six students below the attendance line. Nothing is sent until you approve it.
        </Callout>
        <Callout tone="info" icon={<i data-lucide="info"></i>}>
          Forevue surfaces and shows. Your team always decides.
        </Callout>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
