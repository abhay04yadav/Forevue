<!-- @dsCard group="Slides" viewport="1280x720" name="Stat slide" subtitle="One number, grounded · paper surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--surface-paper); color: var(--color-ink); font-family: var(--font-sans); padding: 84px 96px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--color-deep-teal); }
  .grid { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
  .big { font-weight: 800; font-variant-numeric: tabular-nums; font-size: 220px; line-height: 0.9; letter-spacing: -0.03em; color: var(--color-deep-teal); }
  .big .amber { color: var(--color-amber); }
  .right h2 { font-family: var(--font-serif); font-weight: 600; font-size: 46px; line-height: 1.1; letter-spacing: -0.01em; margin: 0 0 18px; color: var(--color-ink); }
  .right p { font-size: 19px; color: var(--color-neutral-700); margin: 0; line-height: 1.55; max-width: 30ch; }
  .src { margin-top: 26px; font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-mist); }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">The problem, in one number</div>
  <div class="grid">
    <div class="big">8<span class="amber">–</span>12</div>
    <div class="right">
      <h2>systems hold the answer. None of them show it.</h2>
      <p>A typical college runs eight to twelve disconnected systems. The struggling student is in the data the whole time — nobody sees them until it's too late.</p>
      <div class="src">Source · institutional systems audit</div>
    </div>
  </div>
</div>
</body>
</html>
