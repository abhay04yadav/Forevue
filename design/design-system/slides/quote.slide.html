<!-- @dsCard group="Slides" viewport="1280x720" name="Quote slide" subtitle="The product in one sentence · midnight canvas" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--color-midnight-teal); color: #EAF3F2; font-family: var(--font-sans); padding: 96px 110px; display: flex; flex-direction: column; justify-content: center; }
  .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: #6FA9AD; margin-bottom: 36px; }
  blockquote { margin: 0; font-family: var(--font-serif); font-weight: 600; font-size: 58px; line-height: 1.18; letter-spacing: -0.01em; color: #fff; max-width: 24ch; }
  blockquote em { color: var(--color-amber); font-style: italic; }
  .who { margin-top: 40px; font-size: 18px; color: #B9D4D5; max-width: 50ch; line-height: 1.5; }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">Why it matters</div>
  <blockquote>"Six students in CSE-3 slipped below the attendance line this week. Here's why, and <em>who to talk to.</em>"</blockquote>
  <p class="who">That's the whole product in one sentence — specific, grounded, and pointed at a human decision.</p>
</div>
</body>
</html>
