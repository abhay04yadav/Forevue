<!-- @dsCard group="Slides" viewport="1280x720" name="Title slide" subtitle="The resolve opener · Clarity, early." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: radial-gradient(120% 130% at 80% 0%, #0A5560 0%, var(--color-midnight-teal) 62%); color: #EAF3F2; font-family: var(--font-sans); padding: 84px 96px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .lockup { display: flex; align-items: center; gap: 13px; }
  .lockup img { height: 34px; }
  .body { margin-top: auto; }
  .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #6FA9AD; margin-bottom: 26px; }
  h1 { font-family: var(--font-serif); font-weight: 600; font-size: 104px; line-height: 0.98; letter-spacing: -0.02em; color: #fff; margin: 0; }
  h1 em { font-style: italic; color: var(--color-amber); }
  p.sub { font-size: 21px; color: #B9D4D5; margin: 26px 0 0; max-width: 46ch; }
  .resolve { position: absolute; right: 90px; top: 230px; width: 360px; opacity: 0.9; }
</style>
</head>
<body>
<div class="slide">
  <div class="lockup"><img src="../assets/forevue-lockup-on-dark.svg" alt="Forevue"></div>
  <svg class="resolve" viewBox="0 0 460 320" aria-hidden="true">
    <g stroke="#3E747A" stroke-width="2" opacity="0.5">
      <line x1="20" y1="40" x2="220" y2="160"/><line x1="10" y1="100" x2="220" y2="160"/>
      <line x1="30" y1="170" x2="220" y2="160"/><line x1="12" y1="230" x2="220" y2="160"/>
      <line x1="36" y1="285" x2="220" y2="160"/>
    </g>
    <g fill="#5FAEB3"><circle cx="20" cy="40" r="4"/><circle cx="10" cy="100" r="4"/><circle cx="30" cy="170" r="4"/><circle cx="12" cy="230" r="4"/><circle cx="36" cy="285" r="4"/></g>
    <line x1="120" y1="120" x2="300" y2="160" stroke="#7FBFC3" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="160" x2="300" y2="160" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="120" y1="200" x2="300" y2="160" stroke="#7FBFC3" stroke-width="5" stroke-linecap="round"/>
    <circle cx="300" cy="160" r="13" fill="#E6A23C"/>
    <line x1="320" y1="160" x2="362" y2="160" stroke="#E6A23C" stroke-width="6" stroke-linecap="round"/>
  </svg>
  <div class="body">
    <div class="eyebrow">The intelligence layer for higher education</div>
    <h1>Clarity, <em>early.</em></h1>
    <p class="sub">See inside the systems your college already runs — and catch the students who need attention before the exam hall does.</p>
  </div>
</div>
</body>
</html>
